# Codemagic CI config for Chess Reader.
#
# The Flutter app lives in the chess_reader/ subfolder of this repo, so every
# build step cd's into it first.
#
#   ios-testflight : builds a SIGNED .ipa and uploads it to TestFlight. Requires
#                    a paid Apple Developer Program membership and an App Store
#                    Connect API key added to Codemagic (Teams/User settings ->
#                    Integrations -> App Store Connect) under the name shown in
#                    `integrations.app_store_connect` below.
#
#   ios-sideload : builds an UNSIGNED .ipa. You sign it locally with a FREE
#                  Apple ID using Sideloadly or AltStore on your Windows PC and
#                  install it over USB. No Apple credentials are stored here, so
#                  no paid Developer Program is required. (7-day app expiry.)
#
#   macos-dmg    : builds an UNSIGNED .dmg. Quick local testing only; Gatekeeper
#                  will warn on other machines.
#
#   macos-devid  : builds a Developer ID-signed + Apple-NOTARIZED .dmg for direct
#                  download (no App Store). No Gatekeeper warning. Reuses the
#                  `appstore` group (CERTIFICATE_PRIVATE_KEY) + App Store Connect
#                  integration. One-time setup: see the comments in the workflow.
#
#   macos-appstore : builds a Mac App Store-signed .pkg and uploads it to App
#                    Store Connect. Requires the macOS platform enabled on the
#                    `com.alpinist.chessReader` app record and App Sandbox (already
#                    on in Release.entitlements). See the workflow comments.

workflows:
  ios-testflight:
    name: iOS TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      # Must match the App Store Connect API key integration name in Codemagic.
      app_store_connect: Codemagic
    environment:
      flutter: stable
      # NOTE: no `ios_signing:` block here on purpose. That block enables
      # Codemagic's *automatic* signing, which only FETCHES existing profiles
      # and fails with "no matching profiles found" on a fresh account. We do
      # signing manually below so we can pass --create.
      groups:
        # Variable group (created in the Codemagic UI) that holds the secure
        # CERTIFICATE_PRIVATE_KEY. It is only injected into the build if listed
        # here. The key itself is NEVER stored in this file.
        - appstore
      vars:
        FLUTTER_PROJECT: chess_reader
        BUNDLE_ID: com.alpinist.chessReader
    scripts:
      - name: Set up code signing
        script: |
          # Create the distribution certificate + App Store provisioning profile
          # (and register the bundle ID if needed) via the App Store Connect API
          # key, then apply them to the Xcode project. --create makes this work
          # on the very first build when no profile exists yet.
          keychain initialize
          # --certificate-key lets the CLI CREATE the iOS distribution
          # certificate (not just the profile) when none exists yet, and reuse
          # the same one on later builds. CERTIFICATE_PRIVATE_KEY is a secure
          # env var you add in Codemagic (the RSA private key).
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key "@env:CERTIFICATE_PRIVATE_KEY" \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Use CocoaPods instead of Swift Package Manager
        script: |
          # ONNX Runtime's SPM framework ships with a missing MinimumOSVersion,
          # which fails App Store validation (ITMS-90208). The multistockfish
          # plugins don't support SPM either. Disabling SPM makes Flutter
          # integrate every iOS plugin via CocoaPods, which avoids both issues.
          flutter config --no-enable-swift-package-manager
      - name: Flutter pub get
        script: |
          cd "$FLUTTER_PROJECT"
          flutter pub get
      - name: Build signed IPA
        script: |
          cd "$FLUTTER_PROJECT"
          # $PROJECT_BUILD_NUMBER is Codemagic's monotonic per-project counter,
          # so each upload to TestFlight gets a unique, increasing build number.
          flutter build ipa --release \
            --build-number=$PROJECT_BUILD_NUMBER \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - $FLUTTER_PROJECT/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

  ios-sideload:
    name: iOS unsigned (sideload)
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      vars:
        FLUTTER_PROJECT: chess_reader
    scripts:
      - name: Flutter pub get
        script: |
          cd "$FLUTTER_PROJECT"
          flutter pub get
      - name: Build unsigned .app
        script: |
          cd "$FLUTTER_PROJECT"
          flutter build ios --release --no-codesign
      - name: Package unsigned IPA
        script: |
          cd "$FLUTTER_PROJECT/build/ios/iphoneos"
          rm -rf Payload
          mkdir Payload
          cp -R Runner.app Payload/
          zip -r "$CM_BUILD_DIR/chess_reader-unsigned.ipa" Payload
    artifacts:
      - chess_reader-unsigned.ipa

  macos-dmg:
    name: macOS DMG (unsigned)
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      vars:
        FLUTTER_PROJECT: chess_reader
    scripts:
      - name: Flutter pub get
        script: |
          cd "$FLUTTER_PROJECT"
          flutter pub get
      - name: Build macOS
        script: |
          cd "$FLUTTER_PROJECT"
          flutter build macos --release
      - name: Package DMG
        script: |
          cd "$FLUTTER_PROJECT"
          APP=$(ls -d build/macos/Build/Products/Release/*.app | head -1)
          hdiutil create -volname "Chess Reader" -srcfolder "$APP" \
            -ov -format UDZO "$CM_BUILD_DIR/chess_reader.dmg"
    artifacts:
      - chess_reader.dmg

  # ---------------------------------------------------------------------------
  # Developer ID-signed + notarized .dmg (direct download, NOT App Store).
  #
  # One-time setup before the first run:
  #   * Same App Store Connect API key integration (`Codemagic`) the iOS
  #     workflow uses (for notarization).
  #   * A Developer ID Application certificate CANNOT be created by the API key —
  #     Apple restricts that to the Account Holder via the portal (the API
  #     returns 403). So create it once, export it as a .p12, and add it to the
  #     `appstore` variable group in Codemagic as two SECURE vars:
  #       DEVID_CERTIFICATE          = base64 of the .p12
  #       DEVID_CERTIFICATE_PASSWORD = the .p12 export password
  #     How to make the .p12 (on your Mac, signed in as the Account Holder):
  #       1. Keychain Access -> Certificate Assistant -> Request a Certificate
  #          From a Certificate Authority -> save a CSR to disk.
  #       2. developer.apple.com -> Certificates -> + -> "Developer ID
  #          Application" -> upload the CSR -> download the .cer.
  #       3. Double-click the .cer to install, then in Keychain Access right-
  #          click it -> Export -> .p12 (set a password).
  #       4. base64 -i devid.p12 | pbcopy  -> paste as DEVID_CERTIFICATE.
  # ---------------------------------------------------------------------------
  macos-devid:
    name: macOS Developer ID (notarized DMG)
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: Codemagic
    environment:
      flutter: stable
      groups:
        - appstore
      vars:
        FLUTTER_PROJECT: chess_reader
    scripts:
      - name: Set up Developer ID signing
        script: |
          keychain initialize
          # Import the Developer ID Application .p12 supplied via env vars
          # (Apple won't let the API create this cert — Account Holder only).
          echo "$DEVID_CERTIFICATE" | base64 --decode > /tmp/devid.p12
          keychain add-certificates \
            --certificate /tmp/devid.p12 \
            --certificate-password "$DEVID_CERTIFICATE_PASSWORD"
      - name: Use CocoaPods instead of Swift Package Manager
        script: |
          flutter config --no-enable-swift-package-manager
      - name: Flutter pub get
        script: |
          cd "$FLUTTER_PROJECT"
          flutter pub get
      - name: Build and sign the app
        script: |
          cd "$FLUTTER_PROJECT"
          flutter build macos --release
          APP=$(ls -d build/macos/Build/Products/Release/*.app | head -1)
          # Re-sign every nested binary (frameworks, the multistockfish FFI
          # framework, dylibs) and the app with the Developer ID cert + hardened
          # runtime + timestamp — all required for notarization.
          CERT=$(security find-identity -v -p codesigning \
            | grep "Developer ID Application" | head -1 \
            | sed -E 's/.*"(.*)"/\1/')
          codesign --force --deep --options runtime --timestamp \
            --entitlements macos/Runner/Release.entitlements \
            --sign "$CERT" "$APP"
      - name: Notarize and package DMG
        script: |
          cd "$FLUTTER_PROJECT"
          APP=$(ls -d build/macos/Build/Products/Release/*.app | head -1)
          hdiutil create -volname "Chess Reader" -srcfolder "$APP" \
            -ov -format UDZO "$CM_BUILD_DIR/chess_reader.dmg"
          # Notarize the .dmg with the App Store Connect API key (the integration
          # injects APP_STORE_CONNECT_* env vars), then staple the ticket so it
          # validates offline.
          app-store-connect notarize "$CM_BUILD_DIR/chess_reader.dmg"
          xcrun stapler staple "$CM_BUILD_DIR/chess_reader.dmg"
    artifacts:
      - chess_reader.dmg

  # ---------------------------------------------------------------------------
  # Mac App Store-signed .pkg, uploaded to App Store Connect.
  #
  # One-time setup before the first run:
  #   * In App Store Connect, enable the macOS platform on the existing
  #     `com.alpinist.chessReader` app (or create the macOS app record).
  #   * App Sandbox is already enabled in macos/Runner/Release.entitlements.
  #   * fetch-signing-files creates the Mac App Distribution cert + MAC_APP_STORE
  #     profile; the .pkg also needs a Mac Installer Distribution cert (created
  #     below).
  # ---------------------------------------------------------------------------
  macos-appstore:
    name: macOS App Store
    instance_type: mac_mini_m2
    # 120 min: the archive recompiles the native engines (Stockfish + ORT) that
    # `flutter build --config-only` deliberately skips.
    max_build_duration: 120
    integrations:
      app_store_connect: Codemagic
    environment:
      flutter: stable
      groups:
        - appstore
      vars:
        FLUTTER_PROJECT: chess_reader
        BUNDLE_ID: com.alpinist.chessReader
    scripts:
      - name: Set up App Store signing
        script: |
          # Initialize the build keychain with a password WE know. Codemagic's
          # default generates a random password we can't retrieve, which blocks
          # the set-key-partition-list below (without it, productbuild can't use
          # the installer key and dies with CSSMERR_CSP_NO_USER_INTERACTION).
          # This is a throwaway keychain on an isolated VM, so a literal is fine.
          keychain initialize --password ci
          # App-distribution cert + MAC_APP_STORE provisioning profile.
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --platform MAC_OS \
            --type MAC_APP_STORE \
            --certificate-key "@env:CERTIFICATE_PRIVATE_KEY" \
            --create
          # Installer cert used to sign the .pkg (separate from the app cert).
          app-store-connect certificates create \
            --type MAC_INSTALLER_DISTRIBUTION \
            --certificate-key "@env:CERTIFICATE_PRIVATE_KEY" \
            --save || true
          app-store-connect certificates list \
            --type MAC_INSTALLER_DISTRIBUTION \
            --certificate-key "@env:CERTIFICATE_PRIVATE_KEY" \
            --save
          keychain add-certificates
          xcode-project use-profiles
      - name: Use CocoaPods instead of Swift Package Manager
        script: |
          flutter config --no-enable-swift-package-manager
      - name: Flutter pub get
        script: |
          cd "$FLUTTER_PROJECT"
          flutter pub get
      - name: Build and export App Store .pkg
        script: |
          cd "$FLUTTER_PROJECT"
          # Configure the macOS build (ephemeral xcconfig + codegen) but let
          # xcodebuild archive/export do the signing + packaging. Hand-rolling
          # the .pkg with productbuild fails on CI because it can't use the
          # installer private key without a UI prompt
          # (CSSMERR_CSP_NO_USER_INTERACTION); xcodebuild goes through the
          # Codemagic keychain correctly, exactly like the iOS `flutter build
          # ipa` path. use-profiles already applied the MAC_APP_STORE profile +
          # Apple Distribution cert; export_options.plist (written by
          # use-profiles) carries the profile map and `app-store` method.
          flutter build macos --release --config-only \
            --build-number=$PROJECT_BUILD_NUMBER
          xcodebuild -workspace macos/Runner.xcworkspace -scheme Runner \
            -configuration Release \
            -archivePath build/macos/Runner.xcarchive \
            archive
          # Patch the export_options.plist that use-profiles generated:
          #  * method: it writes "ad-hoc"; Xcode 16 wants "app-store-connect".
          #  * signingCertificate / installerSigningCertificate: the keychain
          #    holds BOTH an "Apple Distribution" (app) cert and a "3rd Party
          #    Mac Developer Installer" (pkg) cert. Without telling exportArchive
          #    which is which, it mis-treats the installer cert as the app
          #    signing identity and validates it against the provisioning
          #    profile -> "profile doesn't include signing certificate
          #    ...Installer...". Pinning both roles disambiguates it.
          # The auto-generated provisioning-profile map (name changes per run,
          # so never hardcoded) is left untouched.
          EOPLIST=/Users/builder/export_options.plist
          plutil -replace method -string app-store-connect "$EOPLIST"
          plutil -insert signingCertificate -string "Apple Distribution" "$EOPLIST" 2>/dev/null \
            || plutil -replace signingCertificate -string "Apple Distribution" "$EOPLIST"
          plutil -insert installerSigningCertificate -string "3rd Party Mac Developer Installer" "$EOPLIST" 2>/dev/null \
            || plutil -replace installerSigningCertificate -string "3rd Party Mac Developer Installer" "$EOPLIST"
          echo "--- export_options.plist ---"; plutil -p "$EOPLIST"
          # productbuild (run inside exportArchive) signs the .pkg with the
          # installer key and fails with CSSMERR_CSP_NO_USER_INTERACTION: as
          # imported by Codemagic, that key's ACL/partition-list doesn't grant
          # productbuild non-interactive access, and set-key-partition-list
          # didn't fix it on this Xcode 26 runner. So re-import the installer
          # identity ourselves with `-A` (allow ALL applications), which removes
          # the per-app ACL prompt entirely. The installer cert's private key is
          # the same RSA key every cert was created from (CERTIFICATE_PRIVATE_KEY);
          # pair it with the public cert already in the keychain to rebuild a
          # .p12 we can import unrestricted.
          KEYCHAIN=$(security default-keychain | tr -d ' "')
          # All keychain setup is tee'd to a file so it can be re-printed at the
          # very end on failure (the inline copy scrolls off above the ~20-min
          # archive). 2>&1 on each command captures its real error text.
          {
            echo "keychain: $KEYCHAIN"
            security unlock-keychain -p ci "$KEYCHAIN" 2>&1 \
              && echo "unlock: OK" || echo "unlock: FAILED (password not 'ci')"
            security set-keychain-settings "$KEYCHAIN"   # disable auto-lock
            printf '%s\n' "$CERTIFICATE_PRIVATE_KEY" > /tmp/installer_key.pem
            security find-certificate -c "3rd Party Mac Developer Installer" \
              -p "$KEYCHAIN" > /tmp/installer_cert.pem 2>&1
            echo "key first line:  $(head -1 /tmp/installer_key.pem)"
            echo "cert first line: $(head -1 /tmp/installer_cert.pem)"
            openssl pkcs12 -export -inkey /tmp/installer_key.pem \
              -in /tmp/installer_cert.pem -out /tmp/installer.p12 -passout pass:ci 2>&1 \
              || openssl pkcs12 -export -legacy -inkey /tmp/installer_key.pem \
              -in /tmp/installer_cert.pem -out /tmp/installer.p12 -passout pass:ci 2>&1
            echo "p12: $(ls -l /tmp/installer.p12 2>&1)"
            security import /tmp/installer.p12 -k "$KEYCHAIN" -P ci -A \
              -T /usr/bin/productbuild -T /usr/bin/productsign 2>&1 \
              && echo "import -A: OK" || echo "import -A: FAILED"
            security set-key-partition-list \
              -S apple-tool:,apple:,codesign: -s -k ci "$KEYCHAIN" 2>&1 \
              && echo "partition-list: OK" || echo "partition-list: FAILED"
            echo "--- identities ---"; security find-identity -v "$KEYCHAIN"
          } 2>&1 | tee /tmp/keychain_diag.txt
          xcodebuild -exportArchive \
            -archivePath build/macos/Runner.xcarchive \
            -exportOptionsPlist /Users/builder/export_options.plist \
            -exportPath build/macos/export || {
              D=$(ls -dt /var/folders/*/*/T/Runner_*.xcdistributionlogs 2>/dev/null | head -1)
              echo "logdir: $D"; cat "$D"/*.log 2>/dev/null
              echo ""
              echo "================ KEYCHAIN DIAG (tail) ================"
              cat /tmp/keychain_diag.txt
              exit 1
            }
    artifacts:
      - $FLUTTER_PROJECT/build/macos/export/*.pkg
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
