# Codemagic CI config for Chess Reader.
#
# The Flutter app lives in the chess_reader/ subfolder of this repo, so every
# build step cd's into it first.
#
#   ios-testflight : builds a SIGNED .ipa and uploads it to TestFlight. Requires
#                    a paid Apple Developer Program membership and an App Store
#                    Connect API key added to Codemagic (Teams/User settings ->
#                    Integrations -> App Store Connect) under the name shown in
#                    `integrations.app_store_connect` below.
#
#   ios-sideload : builds an UNSIGNED .ipa. You sign it locally with a FREE
#                  Apple ID using Sideloadly or AltStore on your Windows PC and
#                  install it over USB. No Apple credentials are stored here, so
#                  no paid Developer Program is required. (7-day app expiry.)
#
#   macos-dmg    : builds an unsigned .dmg. Only useful once you have a Mac to
#                  run it on; ignore it until then.

workflows:
  ios-testflight:
    name: iOS TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      # Must match the App Store Connect API key integration name in Codemagic.
      app_store_connect: Codemagic
    environment:
      flutter: stable
      # NOTE: no `ios_signing:` block here on purpose. That block enables
      # Codemagic's *automatic* signing, which only FETCHES existing profiles
      # and fails with "no matching profiles found" on a fresh account. We do
      # signing manually below so we can pass --create.
      vars:
        FLUTTER_PROJECT: chess_reader
        BUNDLE_ID: com.alpinist.chessReader
    scripts:
      - name: Set up code signing
        script: |
          # Create the distribution certificate + App Store provisioning profile
          # (and register the bundle ID if needed) via the App Store Connect API
          # key, then apply them to the Xcode project. --create makes this work
          # on the very first build when no profile exists yet.
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Flutter pub get
        script: |
          cd "$FLUTTER_PROJECT"
          flutter pub get
      - name: Build signed IPA
        script: |
          cd "$FLUTTER_PROJECT"
          # $PROJECT_BUILD_NUMBER is Codemagic's monotonic per-project counter,
          # so each upload to TestFlight gets a unique, increasing build number.
          flutter build ipa --release \
            --build-number=$PROJECT_BUILD_NUMBER \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - $FLUTTER_PROJECT/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

  ios-sideload:
    name: iOS unsigned (sideload)
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      vars:
        FLUTTER_PROJECT: chess_reader
    scripts:
      - name: Flutter pub get
        script: |
          cd "$FLUTTER_PROJECT"
          flutter pub get
      - name: Build unsigned .app
        script: |
          cd "$FLUTTER_PROJECT"
          flutter build ios --release --no-codesign
      - name: Package unsigned IPA
        script: |
          cd "$FLUTTER_PROJECT/build/ios/iphoneos"
          rm -rf Payload
          mkdir Payload
          cp -R Runner.app Payload/
          zip -r "$CM_BUILD_DIR/chess_reader-unsigned.ipa" Payload
    artifacts:
      - chess_reader-unsigned.ipa

  macos-dmg:
    name: macOS DMG (unsigned)
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      vars:
        FLUTTER_PROJECT: chess_reader
    scripts:
      - name: Flutter pub get
        script: |
          cd "$FLUTTER_PROJECT"
          flutter pub get
      - name: Build macOS
        script: |
          cd "$FLUTTER_PROJECT"
          flutter build macos --release
      - name: Package DMG
        script: |
          cd "$FLUTTER_PROJECT"
          APP=$(ls -d build/macos/Build/Products/Release/*.app | head -1)
          hdiutil create -volname "Chess Reader" -srcfolder "$APP" \
            -ov -format UDZO "$CM_BUILD_DIR/chess_reader.dmg"
    artifacts:
      - chess_reader.dmg
